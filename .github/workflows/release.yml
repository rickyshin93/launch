name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          cd target/release
          tar czf on-${{ github.ref_name }}-${{ matrix.target }}.tar.gz on
          shasum -a 256 on-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > on-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/on-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            target/release/on-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
