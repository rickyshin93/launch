name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          cd target/release
          tar czf launch-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz launch
          shasum -a 256 launch-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz > launch-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/launch-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
            target/release/launch-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256
